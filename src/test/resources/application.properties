# ------------------------------------------------------------
# Test profile - az-func-feedback-report
# ------------------------------------------------------------

# ------------------------------------------------------------
# Database
# ------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:feedback_report_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# ------------------------------------------------------------
# Azure Blob Storage extension
# ------------------------------------------------------------
# Evita que o Quarkus Dev Services tente subir Azurite via Docker/Testcontainers durante os testes.
quarkus.azure.storage.blob.devservices.enabled=false

# A extens„o exige endpoint ou connection-string quando est· habilitada.
# Usamos a connection string local padr„o do Azurite apenas para satisfazer a configuraÁ„o em ambiente de teste.
quarkus.azure.storage.blob.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;

# ------------------------------------------------------------
# Report Storage
# ------------------------------------------------------------
app.reports.storage.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;
app.reports.storage.container-name=feedback-reports-test

# ------------------------------------------------------------
# Key Vault
# ------------------------------------------------------------
quarkus.azure.keyvault.secret.enabled=false

# ------------------------------------------------------------
# Observability
# ------------------------------------------------------------
feedback.metrics.prefix=feedback.report.test.

quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true
